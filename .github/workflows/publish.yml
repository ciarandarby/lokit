name: Build and Publish to PyPI

on:
  release:
    types:
      - published
  workflow_dispatch:

jobs:
  build_wheels:
    name: Build wheels on ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ubuntu-latest, windows-latest, macos-14]

    steps:
      - uses: actions/checkout@v4

      - name: Build wheels
        uses: pypa/cibuildwheel@v3.4.1
        env:
          CIBW_BUILD: cp312-* cp313-*
          CIBW_SKIP: "*-musllinux_*"
          CIBW_ARCHS_MACOS: "x86_64 arm64"
          CIBW_TEST_COMMAND: >-
            python -c "import importlib, pathlib, sysconfig; import lokit; package_dir = pathlib.Path(lokit.__file__).parent; ext_suffix = sysconfig.get_config_var('EXT_SUFFIX'); compiled = [path for path in package_dir.rglob('*') if ext_suffix and path.name.endswith(ext_suffix)]; assert compiled, 'wheel does not contain compiled extension modules'; modules = ['lokit.logic', 'lokit.tabular', 'lokit.parsers.csv.extraction', 'lokit.parsers.xlsx.extraction', 'lokit.exporters.csv', 'lokit.exporters.xlsx', 'lokit.exporters.xliff']; missing = [name for name in modules if not pathlib.Path(importlib.import_module(name).__file__).name.endswith(ext_suffix)]; assert not missing, f'modules did not import from compiled extensions: {missing}'; print(f'found {len(compiled)} compiled extension modules')"

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-wheels-${{ matrix.os }}-${{ strategy.job-index }}
          path: ./wheelhouse/*.whl

  build_sdist:
    name: Build source distribution
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5

      - name: Build sdist
        run: uv build --sdist

      - uses: actions/upload-artifact@v4
        with:
          name: cibw-sdist
          path: dist/*.tar.gz

  publish-to-pypi:
    name: Publish Python package to PyPI
    needs: [build_wheels, build_sdist]
    runs-on: ubuntu-latest
    if: github.event_name == 'release' && github.event.action == 'published'
    
    environment:
      name: pypi
      url: https://pypi.org/p/lokit-python
    
    permissions:
      id-token: write
      contents: read
      
    steps:
      - name: Download all the dists
        uses: actions/download-artifact@v4
        with:
          pattern: cibw-*
          path: dist
          merge-multiple: true

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          packages-dir: dist/
